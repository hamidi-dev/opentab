# opentab is a stdlib-only tool; ruff is dev-only tooling (not a runtime dep).
target-version = "py39"
line-length = 100

[lint]
select = ["E", "F", "W", "I", "UP", "B"]
# Long f-strings build fixed-width TUI columns; wrapping them would hurt, not help.
ignore = ["E501"]

[lint.per-file-ignores]
# The package __init__ deliberately re-exports the public API (and a few stdlib
# modules) for callers and the test suite; those imports are "unused" here.
"src/opentab/__init__.py" = ["F401"]
