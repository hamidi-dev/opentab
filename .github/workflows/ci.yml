name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable)
        run: pip install -e .
      - name: Import + byte-compile
        run: |
          python -c "import opentab; print('opentab', opentab.__version__)"
          python -m compileall -q src/opentab
      - name: Smoke test the CLI
        run: |
          opentab --version
          python -m opentab --help
      - name: Unit tests
        run: python test_opentab.py

  # Prove the package installs (pulling in the windows-curses dependency) and
  # imports on native Windows Python, which ships no stdlib curses.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (resolves windows-curses)
        run: pip install -e .
      - name: Import + CLI help
        run: |
          python -c "import opentab; print('opentab', opentab.__version__)"
          opentab --help

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.1.15
      - name: Lint
        run: ruff check src/opentab test_opentab.py
      - name: Format check
        run: ruff format --check src/opentab test_opentab.py
      - name: Shellcheck
        run: shellcheck install.sh
